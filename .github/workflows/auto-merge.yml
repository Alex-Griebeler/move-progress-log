name: auto-merge

# Auto-merge de PRs SOMENTE de baixo risco — e DESLIGADO por padrão.
#
# v1 = MODO OBSERVAÇÃO. Este workflow só age se a variável de repositório
# `ENABLE_AUTO_MERGE` for "true". Enquanto ela não existir/!= true, o job é
# pulado. Isso permite observar o classificador rotular corretamente por um
# tempo ANTES de delegar merge a ele (evita "automatizar antes de ter sinal
# confiável").
#
# Segurança: NÃO confia na label. RE-CLASSIFICA o PR no momento do merge —
# fecha o buraco de "agente se auto-carimbar safe-auto". Só mergeia se a
# re-classificação der safe-auto E todos os checks estiverem verdes.

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Gate global: só roda se explicitamente habilitado pelo humano.
    if: ${{ vars.ENABLE_AUTO_MERGE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolver número do PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = context.payload.pull_request?.number;
            if (!prNumber && context.payload.check_suite) {
              const prs = context.payload.check_suite.pull_requests || [];
              prNumber = prs[0]?.number;
            }
            if (!prNumber) { core.setOutput('skip', 'true'); return; }
            core.setOutput('skip', 'false');
            core.setOutput('number', String(prNumber));

      - name: Checkout
        if: steps.pr.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.pr.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Re-classificar (NÃO confia na label)
        if: steps.pr.outputs.skip == 'false'
        id: reclassify
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          BASE_REF=$(gh pr view "$PR" --json baseRefName -q .baseRefName)
          HEAD_SHA=$(gh pr view "$PR" --json headRefOid -q .headRefOid)
          git fetch origin "$BASE_REF" "$HEAD_SHA" || true
          git diff --name-status "origin/${BASE_REF}...${HEAD_SHA}" > changed.txt
          npx --yes tsx scripts/classify-pr-risk.ts --files-from changed.txt > result.json
          RISK=$(node -e "process.stdout.write(require('./result.json').risk)")
          echo "risk=$RISK" >> "$GITHUB_OUTPUT"

      - name: Pré-flight FAIL-CLOSED — exigir branch protection (quality-gate + classify)
        id: bp
        if: steps.pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sem required status checks, `gh pr merge --auto` mergeia imediato.
          # Então só prosseguimos se a branch protection de `main` exigir
          # explicitamente quality-gate E classify. Qualquer falha de leitura
          # (sem proteção, sem permissão, etc.) => fail-closed (ok=false).
          set +e
          CTX=$(gh api "repos/${GITHUB_REPOSITORY}/branches/main/protection" \
            --jq '[.required_status_checks.checks[]?.context, .required_status_checks.contexts[]?] | unique | join(",")' 2>/dev/null)
          echo "required status checks em main: ${CTX:-<nenhum/sem-leitura>}"
          if echo "$CTX" | grep -q "quality-gate" && echo "$CTX" | grep -q "classify"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Branch protection não exige quality-gate + classify (ou não pôde ser lida). Auto-merge ABORTADO (fail-closed). Configure branch protection antes de habilitar."
          fi

      - name: Mergear se safe-auto + branch protection ok
        if: steps.pr.outputs.skip == 'false' && steps.reclassify.outputs.risk == 'safe-auto' && steps.bp.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          echo "Re-classificação: safe-auto + branch protection exige quality-gate/classify."
          # --auto: o GitHub mergeia só quando os required checks passarem
          # (respeita a branch protection já validada acima). Não força merge imediato.
          gh pr merge "$PR" --squash --auto

      - name: Registrar quando NÃO mergear
        if: steps.pr.outputs.skip == 'false' && (steps.reclassify.outputs.risk != 'safe-auto' || steps.bp.outputs.ok != 'true')
        env:
          RISK: ${{ steps.reclassify.outputs.risk }}
          BP: ${{ steps.bp.outputs.ok }}
        run: echo "Auto-merge não age — risk='$RISK' (precisa safe-auto), branchProtectionOk='$BP' (precisa true)."

name: auto-merge

# Auto-merge de PRs SOMENTE de baixo risco — e DESLIGADO por padrão.
#
# v1 = MODO OBSERVAÇÃO. Este workflow só age se a variável de repositório
# `ENABLE_AUTO_MERGE` for "true". Enquanto ela não existir/!= true, o job é
# pulado. Isso permite observar o classificador rotular corretamente por um
# tempo ANTES de delegar merge a ele (evita "automatizar antes de ter sinal
# confiável").
#
# Segurança: NÃO confia na label. RE-CLASSIFICA o PR no momento do merge —
# fecha o buraco de "agente se auto-carimbar safe-auto". Só mergeia se a
# re-classificação der safe-auto E todos os checks estiverem verdes.

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Gate global: só roda se explicitamente habilitado pelo humano.
    if: ${{ vars.ENABLE_AUTO_MERGE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolver número do PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = context.payload.pull_request?.number;
            if (!prNumber && context.payload.check_suite) {
              const prs = context.payload.check_suite.pull_requests || [];
              prNumber = prs[0]?.number;
            }
            if (!prNumber) { core.setOutput('skip', 'true'); return; }
            core.setOutput('skip', 'false');
            core.setOutput('number', String(prNumber));

      - name: Checkout
        if: steps.pr.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.pr.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Re-classificar (NÃO confia na label)
        if: steps.pr.outputs.skip == 'false'
        id: reclassify
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          BASE_REF=$(gh pr view "$PR" --json baseRefName -q .baseRefName)
          HEAD_SHA=$(gh pr view "$PR" --json headRefOid -q .headRefOid)
          git fetch origin "$BASE_REF" "$HEAD_SHA" || true
          git diff --name-status "origin/${BASE_REF}...${HEAD_SHA}" > changed.txt
          if grep -qE '(^|/)package-lock\.json$' changed.txt; then
            git diff "origin/${BASE_REF}...${HEAD_SHA}" -- package-lock.json > lock.diff || true
          else
            : > lock.diff
          fi
          npx --yes tsx scripts/classify-pr-risk.ts --files-from changed.txt --lockfile-diff lock.diff > result.json
          RISK=$(node -e "process.stdout.write(require('./result.json').risk)")
          echo "risk=$RISK" >> "$GITHUB_OUTPUT"

      - name: Mergear se safe-auto + checks verdes
        if: steps.pr.outputs.skip == 'false' && steps.reclassify.outputs.risk == 'safe-auto'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          echo "Re-classificação: safe-auto. Habilitando auto-merge (squash) quando os checks passarem."
          # --auto deixa o GitHub mergear assim que os required checks ficarem verdes
          # (respeita branch protection). Não força merge imediato.
          gh pr merge "$PR" --squash --auto

      - name: Registrar quando NÃO mergear
        if: steps.pr.outputs.skip == 'false' && steps.reclassify.outputs.risk != 'safe-auto'
        env:
          RISK: ${{ steps.reclassify.outputs.risk }}
        run: echo "Re-classificação deu '$RISK' (não safe-auto) — auto-merge não age."

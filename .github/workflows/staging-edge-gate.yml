name: Staging Edge Gate

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_service_role_tests:
        description: "Run service_role smoke tests (A3/B4/C4)"
        required: false
        default: false
        type: boolean
      git_ref:
        description: "Optional git ref/sha to validate"
        required: false
        default: ""
        type: string

concurrency:
  group: staging-edge-gate
  cancel-in-progress: false

jobs:
  smoke-only:
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_SERVICE_ROLE_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_service_role_tests || 'false' }}

    steps:
      - name: Checkout (CI-triggered SHA)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout (manual ref)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.sha }}

      - name: Resolve smoke configuration
        id: smoke_config
        run: |
          if [ -z "${SUPABASE_URL}" ]; then
            echo "::warning::SUPABASE_URL ausente. Smoke tests serão marcados como SKIP."
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_smoke=true" >> "$GITHUB_OUTPUT"

      - name: Create skipped smoke report
        if: steps.smoke_config.outputs.run_smoke != 'true'
        run: |
          mkdir -p artifacts
          {
            echo "# Edge Auth Smoke Report"
            echo
            echo "| Cenário | Esperado | Obtido | Status |"
            echo "|---|---|---|---|"
            echo "| Global | execução de smoke | SUPABASE_URL ausente no GitHub Actions secrets | SKIP |"
            echo
            echo "- Failures: 0"
            echo "- RUN_SERVICE_ROLE_TESTS: ${RUN_SERVICE_ROLE_TESTS}"
          } > artifacts/edge-smoke-report.md

      - name: Run edge auth smoke tests
        if: steps.smoke_config.outputs.run_smoke == 'true'
        run: bash ./scripts/ci-smoke-edge-auth.sh

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-smoke-report
          path: artifacts/edge-smoke-report.md
          retention-days: 14

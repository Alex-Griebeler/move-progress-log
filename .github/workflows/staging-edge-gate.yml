name: Staging Edge Gate

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_service_role_tests:
        description: "Run service_role smoke tests (A3/B4/C4)"
        required: false
        default: false
        type: boolean
      git_ref:
        description: "Optional git ref/sha to validate"
        required: false
        default: ""
        type: string

concurrency:
  group: staging-edge-gate
  cancel-in-progress: false

jobs:
  smoke-only:
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_SERVICE_ROLE_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_service_role_tests || 'false' }}

    steps:
      - name: Checkout (CI-triggered SHA)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout (manual ref)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.sha }}

      - name: Validate required secrets
        run: |
          missing=0
          for v in SUPABASE_URL SUPABASE_ANON_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: ${v}"
              missing=1
            fi
          done
          if [ "${RUN_SERVICE_ROLE_TESTS}" = "true" ] && [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Missing required secret: SUPABASE_SERVICE_ROLE_KEY"
            missing=1
          fi
          exit "${missing}"

      - name: Run edge auth smoke tests
        run: bash ./scripts/ci-smoke-edge-auth.sh

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-smoke-report
          path: artifacts/edge-smoke-report.md
          retention-days: 14

name: main-watcher

# Vigia a lane que o classificador de PR NÃO cobre: commits DIRETOS no `main`
# SEM PR associado. A Lovable (gpt-engineer-app[bot]) commita direto em main e
# aplica migrations no deploy — foi por aí que entraram role BYPASSRLS e
# migration duplicada, sem PR.
#
# v1.1: NÃO alerta em merges de PR já revisados — só em commit direto.
# v1.2: corrige o race de indexação do listPullRequestsAssociatedWithCommit
# (que abriu falso-positivo no merge do #203). Detecção determinística via
# "(#N)" no título do commit de merge + verificação de PR merged, com a
# associação por API como fallback com retry.

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Commit tem PR associado? (merge revisado vs commit direto)
        id: assoc
        uses: actions/github-script@v7
        with:
          script: |
            // v1.2: dois sinais, pra fechar o race de indexação do
            // listPullRequestsAssociatedWithCommit (que causou falso-positivo
            // no merge do #203 — a associação ainda não estava pronta).
            //
            // SINAL 1 (determinístico, imune ao race): o título do commit de
            // merge do GitHub termina em "(#N)". Pegamos N, buscamos o PR e
            // confirmamos que está MERGED e que o merge_commit_sha bate com
            // este SHA — isso prova que é genuinamente o merge deste PR
            // (não dá pra forjar com um "(#N)" qualquer no texto).
            //
            // SINAL 2 (fallback p/ fluxos sem "(#N)" no título): associação por
            // API com retry, pra dar tempo de indexar.
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            let hasPR = false;
            let why = "";

            const msg = context.payload.head_commit?.message || "";
            const m = msg.match(/\(#(\d+)\)/);
            if (m) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner, repo, pull_number: Number(m[1]),
                });
                if (pr.merged === true && pr.merge_commit_sha === sha) {
                  hasPR = true;
                  why = `título referencia PR #${m[1]} (merged, merge_commit_sha bate)`;
                } else if (pr.merged === true) {
                  // merged mas SHA não bate (ex.: rebase) — ainda é PR revisado.
                  hasPR = true;
                  why = `título referencia PR #${m[1]} (merged; sha não-exato, provável rebase)`;
                }
              } catch (e) {
                core.info(`PR #${m[1]} não pôde ser lido: ${e.message}`);
              }
            }

            // Fallback: associação direta com até 3 tentativas (5s entre elas).
            for (let i = 0; i < 3 && !hasPR; i++) {
              if (i > 0) await sleep(5000);
              const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner, repo, commit_sha: sha,
              });
              if (pulls.length > 0) {
                hasPR = true;
                why = `associação por API: #${pulls.map((p) => p.number).join(", #")}`;
              }
            }

            core.info(`Commit ${sha.slice(0, 7)} → has_pr=${hasPR} ${why || "(commit direto, sem PR)"}`);
            core.setOutput('has_pr', hasPR ? 'true' : 'false');

      - name: Pular (merge de PR revisado)
        if: steps.assoc.outputs.has_pr == 'true'
        run: echo "Commit veio de PR revisado (lane de PR) — main-watcher não alerta. OK."

      - name: Checkout
        if: steps.assoc.outputs.has_pr == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.assoc.outputs.has_pr == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Diff do push (before...after)
        if: steps.assoc.outputs.has_pr == 'false'
        id: diff
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          # Em primeiro push/branch novo, BEFORE pode ser 000...; cai pro último commit.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${AFTER}^..${AFTER}"
          else
            RANGE="${BEFORE}..${AFTER}"
          fi
          echo "range=$RANGE"
          git diff --name-status $RANGE > changed.txt || git show --name-status --format= "$AFTER" > changed.txt
          cat changed.txt

      - name: Classificar commit direto
        if: steps.assoc.outputs.has_pr == 'false'
        id: classify
        run: |
          npx --yes tsx scripts/classify-pr-risk.ts --files-from changed.txt --markdown-out watch.md > result.json || true
          if [ -f result.json ]; then
            RISK=$(node -e "process.stdout.write(require('./result.json').risk)")
          else
            RISK="needs-human"
          fi
          echo "risk=$RISK" >> "$GITHUB_OUTPUT"

      - name: Abrir issue se commit direto for de risco
        if: steps.assoc.outputs.has_pr == 'false' && steps.classify.outputs.risk != 'safe-auto'
        uses: actions/github-script@v7
        env:
          RISK: ${{ steps.classify.outputs.risk }}
        with:
          script: |
            const fs = require('fs');
            const md = fs.existsSync('watch.md') ? fs.readFileSync('watch.md', 'utf8') : '(sem detalhe)';
            const { owner, repo } = context.repo;
            const sha = context.sha.slice(0, 7);
            const author = context.payload.head_commit?.author?.username
              || context.payload.head_commit?.author?.name
              || context.payload.pusher?.name || 'desconhecido';
            const isLovable = /gpt-engineer-app|lovable/i.test(JSON.stringify(context.payload.head_commit?.author || {}))
              || /gpt-engineer-app|lovable/i.test(author);
            const msg = context.payload.head_commit?.message?.split('\n')[0] || '';
            const title = `[main-watcher] commit direto SEM PR em main: ${sha}${isLovable ? ' (Lovable)' : ''}`;
            const body = [
              `Commit direto no \`main\` **sem PR associado** classificado como **${process.env.RISK || 'needs-human'}**.`,
              ``,
              `- SHA: \`${context.sha}\``,
              `- Autor: \`${author}\`${isLovable ? ' — ⚠️ **bot da Lovable**' : ''}`,
              `- Mensagem: ${msg}`,
              ``,
              md,
              ``,
              `> Lane não-gerenciada (sem PR). Revise se este commit deveria ter passado por PR/aprovação humana.`,
            ].join('\n');
            try { await github.rest.issues.createLabel({ owner, repo, name: 'needs-human', color: 'FBCA04' }); } catch {}
            await github.rest.issues.create({ owner, repo, title, body, labels: ['needs-human'] });

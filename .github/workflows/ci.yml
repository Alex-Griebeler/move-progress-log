name: CI

on:
  pull_request:
    branches: [main, ai-automation]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev || true
        # Note: npm audit may report transitive dependency issues
        # that cannot be fixed without upstream updates.
        # We allow warnings but the audit output is still visible.

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            dist/
          retention-days: 7
